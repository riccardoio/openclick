name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  ts:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
        # Live eval is gated on ANTHROPIC_API_KEY. Set it as a repo secret to
        # enable live golden-fixture compile checks on PRs.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - name: Build recorder
        run: cd recorder && swift build -c release
      - name: Test recorder
        run: cd recorder && swift test
